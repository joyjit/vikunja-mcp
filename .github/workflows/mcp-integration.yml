name: MCP Integration

# Live integration tests against an ephemeral Dockerized Vikunja.
# No secrets: register + login mint a JWT at runtime. See docs/MCP-INTEGRATION-CI.md.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

# Prefer `main` when actions/checkout runs `git init` (silences master-branch hint).
env:
  GIT_CONFIG_COUNT: 1
  GIT_CONFIG_KEY_0: init.defaultBranch
  GIT_CONFIG_VALUE_0: main

jobs:
  mcp-integration:
    name: Vikunja + MCP suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Start Vikunja, run MCP tests, tear down
        run: npm run test:mcp

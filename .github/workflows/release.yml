name: Release

on:
  release:
    types: [created]

# Prefer `main` when actions/checkout runs `git init` (silences master-branch hint).
env:
  GIT_CONFIG_COUNT: 1
  GIT_CONFIG_KEY_0: init.defaultBranch
  GIT_CONFIG_VALUE_0: main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'
          scope: '@joyjit'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Publish to NPM
        run: |
          # Overwrite setup-node's userconfig (do not append — an empty
          # _authToken line written at setup time can win and break publish).
          {
            echo '@joyjit:registry=https://registry.npmjs.org/'
            echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}"
          } > "$NPM_CONFIG_USERCONFIG"
          echo "npm_token_len=${#NODE_AUTH_TOKEN}"
          npm whoami
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
